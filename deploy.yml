name: Build and Deploy

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ${{ vars.IMAGE_NAME}}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: startsWith(env.IMAGE_NAME, 'ghcr.io/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags
        id: meta
        run: |
          echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "DATE_TAG=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.SHA_TAG}}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.DATE_TAG}}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          PORT="${{ secrets.DEPLOY_PORT }}"
          {
            echo "Host target"
            echo " HostName ${{ secrets.DEPLOY_HOST }}"
            echo " User ${{ secrets.DEPLOY_USER }}"
            echo " IdentityFile ~/.ssh/id_ed25519"
            echo " StrictHostKeyChecking no"
            if [ -n "$PORT" ]; then
              echo "  Port $PORT"
            fi
          } >> ~/.ssh/config

      - name: Deploy on server (pull & recreate app)
        env:
          APP_VERSION: ${{ steps.meta.outputs.SHA_TAG }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh target "GHCR_USER='${GHCR_USER}' GHCR_TOKEN='${GHCR_TOKEN}' APP_VERSION='${APP_VERSION}' IMAGE_NAME='${IMAGE_NAME}' DEPLOY_PATH='${DEPLOY_PATH}' bash -s" << 'EOSSH'
          set -euo pipefail
          cd "${DEPLOY_PATH:-/home/deploy/pidupall}"

          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          echo "Pulling ${IMAGE_NAME}:${APP_VERSION}"
          docker pull "${IMAGE_NAME}:${APP_VERSION}"

          APP_VERSION="${APP_VERSION}" IMAGE_NAME="${IMAGE_NAME}" docker compose up -d --pull always --no-deps app

          docker image prune -f
          EOSSH
